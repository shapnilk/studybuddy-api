# ==================== LOCAL DEVELOPMENT ====================
# Uses H2 in-memory database — no setup required locally

spring.application.name=studybuddy

# H2 In-Memory Database (local)
spring.datasource.url=jdbc:h2:mem:studybuddydb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 Console (for debugging locally — go to localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server port
server.port=8080

# ==================== PRODUCTION (Google Cloud Run) ====================
# These override the above when deployed
# Set these as environment variables in Cloud Run:
#
# SPRING_DATASOURCE_URL=jdbc:postgresql://<host>/<dbname>
# SPRING_DATASOURCE_USERNAME=<username>
# SPRING_DATASOURCE_PASSWORD=<password>
# SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
# SPRING_JPA_HIBERNATE_DDL_AUTO=update
